name: Android Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build & Sign APK/AAB
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up JDK 17 ─────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Download gradle-wrapper.jar ────────────────────────────
      # gradle-wrapper.jar cannot be served by the repository host.
      # We download it directly from Gradle's official distribution.
      - name: Download gradle-wrapper.jar
        run: |
          mkdir -p gradle/wrapper
          curl -sL \
            "https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar
          # Verify size > 50KB (real jar)
          SIZE=$(wc -c < gradle/wrapper/gradle-wrapper.jar)
          echo "Downloaded gradle-wrapper.jar: ${SIZE} bytes"
          if [ "$SIZE" -lt 50000 ]; then
            echo "ERROR: gradle-wrapper.jar too small, download may have failed"
            exit 1
          fi

      # ── 4. Grant execute permission ───────────────────────────────
      - name: Grant gradlew permission
        run: chmod +x gradlew

      # ── 5. Setup Android SDK ─────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── 6. Cache Gradle ───────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      # ── 7. Decode keystore ────────────────────────────────────────
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > ${{ github.workspace }}/app/phimhay-release.jks
          echo "Keystore decoded: $(wc -c < ${{ github.workspace }}/app/phimhay-release.jks) bytes"

      # ── 8. Build Release APK ──────────────────────────────────────
      - name: Build Release APK
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/app/phimhay-release.jks
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
          KEY_ALIAS:     ${{ secrets.KEY_ALIAS }}
          KEY_PASS:      ${{ secrets.KEY_PASS }}
        run: ./gradlew assembleRelease --stacktrace --no-daemon

      # ── 9. Build Release AAB ──────────────────────────────────────
      - name: Build Release AAB
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/app/phimhay-release.jks
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
          KEY_ALIAS:     ${{ secrets.KEY_ALIAS }}
          KEY_PASS:      ${{ secrets.KEY_PASS }}
        run: ./gradlew bundleRelease --stacktrace --no-daemon

      # ── 10. Rename artifacts ──────────────────────────────────────
      - name: Rename artifacts
        run: |
          VERSION="${{ github.ref_name }}"
          APK="app/build/outputs/apk/release/app-release.apk"
          AAB="app/build/outputs/bundle/release/app-release.aab"
          [ -f "$APK" ] && cp "$APK" "PhimHay-${VERSION}.apk" || echo "APK not found"
          [ -f "$AAB" ] && cp "$AAB" "PhimHay-${VERSION}.aab" || echo "AAB not found"
          ls -la *.apk *.aab 2>/dev/null || true

      # ── 11. Upload APK artifact ───────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PhimHay-APK-${{ github.ref_name }}
          path: "*.apk"
          retention-days: 30

      # ── 12. Upload AAB artifact ───────────────────────────────────
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: PhimHay-AAB-${{ github.ref_name }}
          path: "*.aab"
          retention-days: 30

      # ── 13. Create GitHub Release ─────────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "🎬 PhimHay ${{ github.ref_name }}"
          body: |
            ## 🎬 PhimHay ${{ github.ref_name }}

            ### 📥 Tải xuống
            | File | Mô tả |
            |------|-------|
            | `*.apk` | Cài trực tiếp trên Android |
            | `*.aab` | Dành cho Google Play Store |

            ### 📋 Yêu cầu
            - Android 7.0+ (API 24)
            - Cho phép cài từ nguồn không rõ để dùng APK

            ### 🔑 Keystore Info
            - Alias: `phimhay`
            - Validity: 10,000 ngày (~27 năm)
          files: |
            *.apk
            *.aab
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 14. Cleanup ───────────────────────────────────────────────
      - name: Cleanup keystore
        if: always()
        run: rm -f ${{ github.workspace }}/app/phimhay-release.jks
