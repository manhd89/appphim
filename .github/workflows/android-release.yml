name: Android Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build & Sign APK/AAB
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. JDK 17 ─────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Gradle 8.4 (installs system gradle — no wrapper jar needed) ────
      - name: Setup Gradle 8.4
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'
          cache-read-only: false

      # ── 4. Android SDK ─────────────────────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── 5. Validate secrets ────────────────────────────────────────────────
      - name: Validate secrets
        run: |
          if [ -z "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "❌ ERROR: KEYSTORE_BASE64 secret is not set!"
            echo "   Go to: repo Settings → Secrets and variables → Actions"
            echo "   Add secret KEYSTORE_BASE64 with the base64 of your keystore"
            exit 1
          fi
          if [ -z "${{ secrets.KEYSTORE_PASS }}" ]; then
            echo "❌ ERROR: KEYSTORE_PASS secret is not set!"
            exit 1
          fi
          if [ -z "${{ secrets.KEY_ALIAS }}" ]; then
            echo "❌ ERROR: KEY_ALIAS secret is not set!"
            exit 1
          fi
          if [ -z "${{ secrets.KEY_PASS }}" ]; then
            echo "❌ ERROR: KEY_PASS secret is not set!"
            exit 1
          fi
          echo "✅ All secrets present"

      # ── 6. Decode keystore ─────────────────────────────────────────────────
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode \
            > "${{ github.workspace }}/app/phimhay-release.jks"
          SIZE=$(wc -c < "${{ github.workspace }}/app/phimhay-release.jks")
          echo "✅ Keystore decoded: ${SIZE} bytes"
          if [ "$SIZE" -lt 500 ]; then
            echo "❌ Keystore too small — KEYSTORE_BASE64 may be incorrect"
            exit 1
          fi

      # ── 7. Cache Gradle ────────────────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      # ── 8. Build Release APK ───────────────────────────────────────────────
      - name: Build Release APK
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/app/phimhay-release.jks
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
          KEY_ALIAS:     ${{ secrets.KEY_ALIAS }}
          KEY_PASS:      ${{ secrets.KEY_PASS }}
        run: |
          gradle assembleRelease --stacktrace --no-daemon
          echo "✅ APK build complete"

      # ── 9. Build Release AAB ───────────────────────────────────────────────
      - name: Build Release AAB
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/app/phimhay-release.jks
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
          KEY_ALIAS:     ${{ secrets.KEY_ALIAS }}
          KEY_PASS:      ${{ secrets.KEY_PASS }}
        run: |
          gradle bundleRelease --stacktrace --no-daemon
          echo "✅ AAB build complete"

      # ── 10. Rename & list artifacts ────────────────────────────────────────
      - name: Rename artifacts
        run: |
          VERSION="${{ github.ref_name }}"
          [ -z "$VERSION" ] && VERSION="manual"
          APK="app/build/outputs/apk/release/app-release.apk"
          AAB="app/build/outputs/bundle/release/app-release.aab"
          [ -f "$APK" ] && cp "$APK" "PhimHay-${VERSION}.apk" && echo "✅ APK: PhimHay-${VERSION}.apk"
          [ -f "$AAB" ] && cp "$AAB" "PhimHay-${VERSION}.aab" && echo "✅ AAB: PhimHay-${VERSION}.aab"
          ls -lh PhimHay-* 2>/dev/null || echo "⚠️ No renamed artifacts found"

      # ── 11. Upload APK ─────────────────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: PhimHay-APK-${{ github.ref_name }}
          path: "*.apk"
          if-no-files-found: warn
          retention-days: 30

      # ── 12. Upload AAB ─────────────────────────────────────────────────────
      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: PhimHay-AAB-${{ github.ref_name }}
          path: "*.aab"
          if-no-files-found: warn
          retention-days: 30

      # ── 13. GitHub Release (tag push only) ────────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "🎬 PhimHay ${{ github.ref_name }}"
          body: |
            ## 🎬 PhimHay ${{ github.ref_name }}

            ### 📥 Tải xuống
            | File | Mô tả |
            |------|-------|
            | `*.apk` | Cài trực tiếp trên Android |
            | `*.aab` | Dành cho Google Play Store |

            ### 📋 Yêu cầu hệ thống
            - Android 7.0+ (API 24)

            ### 🔧 Cài đặt APK
            Bật "Cài từ nguồn không rõ" trong Cài đặt → Bảo mật
          files: |
            *.apk
            *.aab
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 14. Cleanup ────────────────────────────────────────────────────────
      - name: Cleanup keystore
        if: always()
        run: rm -f "${{ github.workspace }}/app/phimhay-release.jks"
